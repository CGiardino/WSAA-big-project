# Python package
# Create and test a Python package on multiple Python versions.
# Add steps that analyze code, save the dist with the build record, publish to a PyPI-compatible index, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/python

trigger:
- main

variables:
- group: RiskClassifier
- name: python.version
  value: '3.11'
- name: node.version
  value: '20.x'
- name: imageRepository
  value: 'wsaa-backend'
- name: dockerfilePath
  value: 'backend/Dockerfile'
- name: buildContext
  value: 'backend'
- name: imageTag
  value: '$(Build.BuildId)'
- name: dockerRegistryServiceConnection
  value: 'RiskClassifier'
- name: azureServiceConnection
  value: 'RiskClassifierResourceManager'
- name: acrLoginServer
  value: 'riskclassifier.azurecr.io'
- name: frontendAppUrl
  value: 'https://lively-flower-01678ba03.1.azurestaticapps.net'
- name: backendApiUrl
  value: 'https://riskclassifier.proudsmoke-f0a79518.westus2.azurecontainerapps.io'
# Set these in Azure DevOps variables (or a variable group).
- name: containerAppName
  value: 'riskclassifier'
# resourceGroup is resolved dynamically from Azure during deploy.
# azureStaticWebAppsApiToken: '<secret-token>'

pool:
  vmImage: ubuntu-latest

strategy:
  matrix:
    Python311:
      python.version: '3.11'

steps:
- task: UsePythonVersion@0
  inputs:
    versionSpec: '$(python.version)'
  displayName: 'Use Python $(python.version)'

- task: NodeTool@0
  inputs:
    versionSpec: '$(node.version)'
  displayName: 'Use Node.js $(node.version)'

- script: |
    python -m pip install --upgrade pip
    pip install -r backend/requirements.txt
  displayName: 'Install dependencies'

- script: |
    cd backend
    pytest -q
    exit_code=$?
    # Exit code 5 means no tests collected; keep CI green until tests are added.
    if [ "$exit_code" -eq 5 ]; then
      echo "No tests collected in backend; skipping failure."
      exit 0
    fi
    exit "$exit_code"
  displayName: 'pytest'

- script: |
    cd frontend
    npm ci
  displayName: 'Install frontend dependencies'

- script: |
    cat > frontend/src/assets/env.js <<'EOF'
    window.__WSAA_ENV__ = {
      apiBaseUrl: '$(backendApiUrl)',
    };
    EOF
  displayName: 'Set frontend runtime API URL'

- script: |
    cd frontend
    npm run build
  displayName: 'Build frontend'

- task: Docker@2
  displayName: 'Build and push backend image'
  inputs:
    containerRegistry: '$(dockerRegistryServiceConnection)'
    repository: '$(imageRepository)'
    command: 'buildAndPush'
    Dockerfile: '$(dockerfilePath)'
    buildContext: '$(buildContext)'
    tags: |
      $(imageTag)
      latest

- task: AzureCLI@2
  displayName: 'Deploy backend to Azure Container App'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      set -euo pipefail
      IMAGE="$(acrLoginServer)/$(imageRepository):$(imageTag)"
      RESOURCE_GROUP="$(az resource list --name '$(containerAppName)' --resource-type Microsoft.App/containerApps --query '[0].resourceGroup' -o tsv)"
      if [ -z "$RESOURCE_GROUP" ]; then
        echo "Unable to resolve resource group for Container App $(containerAppName)."
        exit 1
      fi
      az containerapp update \
        --name "$(containerAppName)" \
        --resource-group "$RESOURCE_GROUP" \
        --image "$IMAGE" \
        --set-env-vars WSAA_CORS_ORIGINS="$(frontendAppUrl)"

- task: AzureStaticWebApp@0
  displayName: 'Deploy frontend to Azure Static Web App'
  inputs:
    azure_static_web_apps_api_token: '$(azureStaticWebAppsApiToken)'
    app_location: 'frontend/dist/wsaa-risk-frontend'
    output_location: ''
    skip_app_build: true

